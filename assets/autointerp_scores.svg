<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" font-family="monospace, sans-serif">
  <rect width="640" height="340" fill="#0d1117" rx="12"/>

  <text x="320" y="32" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Auto-Interp Balanced Accuracy by Layer and Scale</text>
  <text x="320" y="50" text-anchor="middle" fill="#8b949e" font-size="11">Claude describes top-30 features; forced-choice scorer predicts which snippets activate. 0.5 = random, 1.0 = perfect.</text>

  <!-- axes -->
  <line x1="80" y1="260" x2="580" y2="260" stroke="#30363d" stroke-width="1.5"/>
  <line x1="80" y1="80"  x2="80"  y2="260" stroke="#30363d" stroke-width="1.5"/>

  <!-- y gridlines: 0.5 to 1.0, range=0.5, scale: (val-0.5)/0.5 * 180 -->
  <!-- y = 260 - (val-0.5)/0.5 * 180 -->
  <text x="34" y="264" text-anchor="end" fill="#8b949e" font-size="10">0.50</text>
  <line x1="80" y1="260" x2="580" y2="260" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="34" y="224" text-anchor="end" fill="#8b949e" font-size="10">0.60</text>
  <line x1="80" y1="224" x2="580" y2="224" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="34" y="188" text-anchor="end" fill="#8b949e" font-size="10">0.70</text>
  <line x1="80" y1="188" x2="580" y2="188" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="34" y="152" text-anchor="end" fill="#8b949e" font-size="10">0.80</text>
  <line x1="80" y1="152" x2="580" y2="152" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="34" y="116" text-anchor="end" fill="#8b949e" font-size="10">0.90</text>
  <line x1="80" y1="116" x2="580" y2="116" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="34" y="80" text-anchor="end" fill="#8b949e" font-size="10">1.00</text>
  <line x1="80" y1="80"  x2="580" y2="80" stroke="#21262d" stroke-dasharray="3,3"/>

  <!-- chance line annotation -->
  <text x="584" y="264" fill="#f0883e" font-size="9">chance</text>

  <!-- scores: L3-5M=0.883, L3-50M=0.901, L6-5M=0.893, L6-50M=0.804, L9-5M=0.888, L9-50M=0.858 -->
  <!-- y for val: 260 - (val-0.5)/0.5*180 -->
  <!-- L3-5M: y=260-(0.383)*180=260-68.9=191  -->
  <!-- L3-50M: y=260-(0.401)*180=260-72.2=188  -->
  <!-- L6-5M: y=260-(0.393)*180=260-70.7=189  -->
  <!-- L6-50M: y=260-(0.304)*180=260-54.7=205  -->
  <!-- L9-5M: y=260-(0.388)*180=260-69.8=190  -->
  <!-- L9-50M: y=260-(0.358)*180=260-64.4=196  -->

  <!-- Layer 3 -->
  <text x="187" y="290" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Layer 3</text>
  <rect x="127" y="191" width="38" height="69" fill="#388bfd" rx="3" opacity="0.7"/>
  <text x="146" y="186" text-anchor="middle" fill="#388bfd" font-size="10">0.883</text>
  <rect x="209" y="188" width="38" height="72" fill="#3fb950" rx="3" opacity="0.9"/>
  <text x="228" y="183" text-anchor="middle" fill="#3fb950" font-size="10">0.901</text>

  <!-- Layer 6 -->
  <text x="337" y="290" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Layer 6</text>
  <rect x="277" y="189" width="38" height="71" fill="#388bfd" rx="3" opacity="0.7"/>
  <text x="296" y="184" text-anchor="middle" fill="#388bfd" font-size="10">0.893</text>
  <rect x="359" y="205" width="38" height="55" fill="#3fb950" rx="3" opacity="0.9"/>
  <text x="378" y="200" text-anchor="middle" fill="#f0883e" font-size="10">0.804</text>

  <!-- Layer 9 -->
  <text x="487" y="290" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Layer 9</text>
  <rect x="427" y="190" width="38" height="70" fill="#388bfd" rx="3" opacity="0.7"/>
  <text x="446" y="185" text-anchor="middle" fill="#388bfd" font-size="10">0.888</text>
  <rect x="509" y="196" width="38" height="64" fill="#3fb950" rx="3" opacity="0.9"/>
  <text x="528" y="191" text-anchor="middle" fill="#3fb950" font-size="10">0.858</text>

  <!-- annotation for L6 50M drop -->
  <text x="378" y="224" text-anchor="middle" fill="#8b949e" font-size="9">features more</text>
  <text x="378" y="234" text-anchor="middle" fill="#8b949e" font-size="9">complex → harder</text>
  <text x="378" y="244" text-anchor="middle" fill="#8b949e" font-size="9">to describe</text>

  <!-- legend -->
  <rect x="210" y="308" width="14" height="12" fill="#388bfd" rx="2" opacity="0.7"/>
  <text x="228" y="319" fill="#8b949e" font-size="11">5M tokens</text>
  <rect x="310" y="308" width="14" height="12" fill="#3fb950" rx="2" opacity="0.9"/>
  <text x="328" y="319" fill="#8b949e" font-size="11">50M tokens</text>
</svg>
