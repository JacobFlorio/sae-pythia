<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" font-family="monospace, sans-serif">
  <rect width="640" height="400" fill="#0d1117" rx="12"/>

  <text x="320" y="32" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Feature Diversity: 5M → 50M Token Phase Transition</text>
  <text x="320" y="50" text-anchor="middle" fill="#8b949e" font-size="11">Unique clusters (Jaccard dedupe) and strict mid-doc features in top-50 by peak activation.</text>

  <!-- ── Unique clusters panel ── -->
  <text x="160" y="80" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Unique Clusters</text>
  <!-- y: 320 = 0, 100 = 40 clusters  scale: (val/40)*220 -->
  <line x1="40" y1="320" x2="290" y2="320" stroke="#30363d" stroke-width="1.5"/>
  <line x1="40" y1="100" x2="40"  y2="320" stroke="#30363d" stroke-width="1.5"/>
  <!-- gridlines -->
  <line x1="40" y1="265" x2="290" y2="265" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="34" y="269" text-anchor="end" fill="#8b949e" font-size="9">10</text>
  <line x1="40" y1="210" x2="290" y2="210" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="34" y="214" text-anchor="end" fill="#8b949e" font-size="9">20</text>
  <line x1="40" y1="155" x2="290" y2="155" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="34" y="159" text-anchor="end" fill="#8b949e" font-size="9">30</text>
  <line x1="40" y1="100" x2="290" y2="100" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="34" y="104" text-anchor="end" fill="#8b949e" font-size="9">40</text>
  <text x="34" y="324" text-anchor="end" fill="#8b949e" font-size="9">0</text>

  <!-- L3: 3→27  bars at x=70,100 w=22 -->
  <text x="91" y="345" text-anchor="middle" fill="#e6edf3" font-size="11">L3</text>
  <rect x="68" y="303" width="22" height="17" fill="#388bfd" rx="2" opacity="0.7"/>
  <text x="79" y="298" text-anchor="middle" fill="#388bfd" font-size="9">3</text>
  <rect x="100" y="171" width="22" height="149" fill="#3fb950" rx="2" opacity="0.9"/>
  <text x="111" y="166" text-anchor="middle" fill="#3fb950" font-size="9">27</text>

  <!-- L6: 5→26  bars at x=150,180 -->
  <text x="171" y="345" text-anchor="middle" fill="#e6edf3" font-size="11">L6</text>
  <rect x="148" y="292" width="22" height="28" fill="#388bfd" rx="2" opacity="0.7"/>
  <text x="159" y="287" text-anchor="middle" fill="#388bfd" font-size="9">5</text>
  <rect x="180" y="177" width="22" height="143" fill="#3fb950" rx="2" opacity="0.9"/>
  <text x="191" y="172" text-anchor="middle" fill="#3fb950" font-size="9">26</text>

  <!-- L9: 3→39  bars at x=230,260 -->
  <text x="251" y="345" text-anchor="middle" fill="#e6edf3" font-size="11">L9</text>
  <rect x="228" y="303" width="22" height="17" fill="#388bfd" rx="2" opacity="0.7"/>
  <text x="239" y="298" text-anchor="middle" fill="#388bfd" font-size="9">3</text>
  <rect x="260" y="105" width="22" height="215" fill="#da3633" rx="2" opacity="0.9"/>
  <text x="271" y="100" text-anchor="middle" fill="#da3633" font-size="9" font-weight="bold">39</text>

  <!-- ── Mid-doc features panel ── -->
  <text x="480" y="80" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Strict Mid-Doc Features / 50</text>
  <line x1="360" y1="320" x2="610" y2="320" stroke="#30363d" stroke-width="1.5"/>
  <line x1="360" y1="100" x2="360" y2="320" stroke="#30363d" stroke-width="1.5"/>
  <!-- gridlines: scale (val/30)*220  30 max -->
  <line x1="360" y1="247" x2="610" y2="247" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="354" y="251" text-anchor="end" fill="#8b949e" font-size="9">10</text>
  <line x1="360" y1="173" x2="610" y2="173" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="354" y="177" text-anchor="end" fill="#8b949e" font-size="9">20</text>
  <line x1="360" y1="100" x2="610" y2="100" stroke="#21262d" stroke-dasharray="3,3"/>
  <text x="354" y="104" text-anchor="end" fill="#8b949e" font-size="9">30</text>
  <text x="354" y="324" text-anchor="end" fill="#8b949e" font-size="9">0</text>

  <!-- L3: 0→12 -->
  <text x="411" y="345" text-anchor="middle" fill="#e6edf3" font-size="11">L3</text>
  <rect x="388" y="319" width="22" height="1" fill="#388bfd" rx="2" opacity="0.7"/>
  <text x="399" y="314" text-anchor="middle" fill="#8b949e" font-size="9">0</text>
  <rect x="420" y="232" width="22" height="88" fill="#3fb950" rx="2" opacity="0.9"/>
  <text x="431" y="227" text-anchor="middle" fill="#3fb950" font-size="9">12</text>

  <!-- L6: 1→12 -->
  <text x="491" y="345" text-anchor="middle" fill="#e6edf3" font-size="11">L6</text>
  <rect x="468" y="312" width="22" height="8" fill="#388bfd" rx="2" opacity="0.7"/>
  <text x="479" y="307" text-anchor="middle" fill="#388bfd" font-size="9">1</text>
  <rect x="500" y="232" width="22" height="88" fill="#3fb950" rx="2" opacity="0.9"/>
  <text x="511" y="227" text-anchor="middle" fill="#3fb950" font-size="9">12</text>

  <!-- L9: 0→25 -->
  <text x="571" y="345" text-anchor="middle" fill="#e6edf3" font-size="11">L9</text>
  <rect x="548" y="319" width="22" height="1" fill="#388bfd" rx="2" opacity="0.7"/>
  <text x="559" y="314" text-anchor="middle" fill="#8b949e" font-size="9">0</text>
  <rect x="580" y="136" width="22" height="184" fill="#da3633" rx="2" opacity="0.9"/>
  <text x="591" y="131" text-anchor="middle" fill="#da3633" font-size="9" font-weight="bold">25</text>

  <!-- legend -->
  <rect x="210" y="368" width="14" height="12" fill="#388bfd" rx="2" opacity="0.7"/>
  <text x="228" y="379" fill="#8b949e" font-size="11">5M tokens</text>
  <rect x="310" y="368" width="14" height="12" fill="#3fb950" rx="2" opacity="0.9"/>
  <text x="328" y="379" fill="#8b949e" font-size="11">50M tokens</text>
  <text x="410" y="379" fill="#da3633" font-size="11">▲ L9 biggest gainer</text>
</svg>
