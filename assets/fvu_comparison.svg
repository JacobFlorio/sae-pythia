<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" font-family="monospace, sans-serif">
  <!-- background -->
  <rect width="640" height="360" fill="#0d1117" rx="12"/>

  <!-- title -->
  <text x="320" y="32" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Reconstruction Quality (FVU) — 5M vs 50M Tokens</text>
  <text x="320" y="50" text-anchor="middle" fill="#8b949e" font-size="11">Lower is better. Pythia-160M, 16 384 features, top-k=32.</text>

  <!-- axes -->
  <line x1="80" y1="280" x2="580" y2="280" stroke="#30363d" stroke-width="1.5"/>
  <line x1="80" y1="70"  x2="80"  y2="280" stroke="#30363d" stroke-width="1.5"/>

  <!-- y gridlines and labels -->
  <!-- max fvu shown: 0.14, ticks at 0, 0.02, 0.04, ..., 0.14 -->
  <!-- y = 280 - (fvu/0.14)*210 -->
  <line x1="80" y1="280" x2="580" y2="280" stroke="#21262d" stroke-width="1"/>
  <text x="70" y="284" text-anchor="end" fill="#8b949e" font-size="10">0.00</text>
  <line x1="80" y1="250" x2="580" y2="250" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="254" text-anchor="end" fill="#8b949e" font-size="10">0.02</text>
  <line x1="80" y1="220" x2="580" y2="220" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="224" text-anchor="end" fill="#8b949e" font-size="10">0.04</text>
  <line x1="80" y1="190" x2="580" y2="190" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="194" text-anchor="end" fill="#8b949e" font-size="10">0.06</text>
  <line x1="80" y1="160" x2="580" y2="160" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="164" text-anchor="end" fill="#8b949e" font-size="10">0.08</text>
  <line x1="80" y1="130" x2="580" y2="130" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="134" text-anchor="end" fill="#8b949e" font-size="10">0.10</text>
  <line x1="80" y1="100" x2="580" y2="100" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="104" text-anchor="end" fill="#8b949e" font-size="10">0.12</text>
  <line x1="80" y1="70" x2="580" y2="70" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="74" text-anchor="end" fill="#8b949e" font-size="10">0.14</text>

  <!-- y axis label -->
  <text x="18" y="180" text-anchor="middle" fill="#8b949e" font-size="11" transform="rotate(-90,18,180)">FVU</text>

  <!-- bars: 6 groups (L3-5M, L3-50M, L6-5M, L6-50M, L9-5M, L9-50M) -->
  <!-- x positions: centers at 147, 213, 297, 363, 447, 513 -->
  <!-- bar width 40, gap between pairs 30, gap between layers 50 -->
  <!-- y = 280 - (fvu/0.14)*210 -->

  <!-- Layer 3 -->
  <text x="187" y="305" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Layer 3</text>
  <!-- 5M: fvu=0.078  h = 0.078/0.14*210 = 117 -->
  <rect x="127" y="163" width="38" height="117" fill="#388bfd" rx="3" opacity="0.7"/>
  <text x="146" y="158" text-anchor="middle" fill="#388bfd" font-size="10">0.078</text>
  <!-- 50M: fvu=0.042  h = 0.042/0.14*210 = 63 -->
  <rect x="209" y="217" width="38" height="63" fill="#3fb950" rx="3" opacity="0.9"/>
  <text x="228" y="212" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">0.042</text>

  <!-- Layer 6 -->
  <text x="337" y="305" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Layer 6</text>
  <!-- 5M: fvu=0.074  h=111 -->
  <rect x="277" y="169" width="38" height="111" fill="#388bfd" rx="3" opacity="0.7"/>
  <text x="296" y="164" text-anchor="middle" fill="#388bfd" font-size="10">0.074</text>
  <!-- 50M: fvu=0.057  h=85.5 -->
  <rect x="359" y="194" width="38" height="86" fill="#3fb950" rx="3" opacity="0.9"/>
  <text x="378" y="189" text-anchor="middle" fill="#3fb950" font-size="10">0.057</text>

  <!-- Layer 9 -->
  <text x="487" y="305" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Layer 9</text>
  <!-- 5M: fvu=0.125  h=187.5 -->
  <rect x="427" y="92" width="38" height="188" fill="#388bfd" rx="3" opacity="0.7"/>
  <text x="446" y="87" text-anchor="middle" fill="#388bfd" font-size="10">0.125</text>
  <!-- 50M: fvu=0.099  h=148.5 -->
  <rect x="509" y="131" width="38" height="149" fill="#3fb950" rx="3" opacity="0.9"/>
  <text x="528" y="126" text-anchor="middle" fill="#f0883e" font-size="10">0.099</text>

  <!-- legend -->
  <rect x="200" y="326" width="14" height="14" fill="#388bfd" rx="2" opacity="0.7"/>
  <text x="218" y="338" fill="#8b949e" font-size="11">5M tokens</text>
  <rect x="310" y="326" width="14" height="14" fill="#3fb950" rx="2" opacity="0.9"/>
  <text x="328" y="338" fill="#8b949e" font-size="11">50M tokens</text>
</svg>
